<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox2</title>
    <style>
        .container{
            background-color: rgb(43, 43, 43);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h3{
            color: gray;
        }
        .info{
            width: 50px;
            height: 25px;
            border-style: solid;
        }
        .search{
            background-color: white;
            border-style: solid;
            width: 200px;
            height: 50px;
        }
        .height{
            height: 100px;
            width: 1px;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="info" style="background-color: white;">
            <center>
                <h3>Info</h3>
            </center>
        </div>
        <div class="search" style="background-color: rgb(211, 211, 211);">
            <h3>Search...</h3>
        </div>
        <div class="height" style="background-color: rgb(43, 43, 43);"></div>
    </div>
</body>
</html>
